name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          BACKEND_URL: http://127.0.0.1:8000

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BackEnd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BackEnd/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py test competitions.tests
        env:
          USE_SQLITE_TEST: "true"
          SECRET_KEY: ci-test-secret
          SIGNUP_SECRET_CODE: test-code
